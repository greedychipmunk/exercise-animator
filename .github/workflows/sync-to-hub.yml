name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

  # Allow running this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://dcblackhouse:$HF_TOKEN@huggingface.co/spaces/dcblackhouse/exercise-animator main
